log:
  level: debug

database:
  dsn: "postgres://postgres@/anthrimon?host=/var/run/postgresql&sslmode=disable"
  max_conns: 5
  min_conns: 1

snmp:
  timeout_seconds: 10
  retries: 3

polling:
  default_interval_s: 60
  health_multiplier: 5
  device_refresh_s: 300
  max_concurrent_devices: 500

metrics:
  victoriametrics_url: "http://localhost:8428"
  flush_interval: 10s
  batch_size: 500
